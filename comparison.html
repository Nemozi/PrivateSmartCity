<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Studie: Vergleich</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.png" type="image/png">    
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="top-bar">
    <a href="index.html" class="top-bar-left">
        <img src="favicon.png" alt="Logo" class="top-logo">
        <span class="top-title">Fahrradstudie</span>
    </a>
    
    <div class="top-bar-right">
        <a href="info.html" class="info-link">Info</a>
    </div>
    </nav>
    <<div class="main-wrapper">
    <header class="neo-box">
        <h2>Abschluss: Direkter Vergleich</h2>
        <p>Welches der drei Konzepte würde Sie am ehesten überzeugen?</p>
    </header>

    <div id="comparison-render" class="comparison-grid">
        <!-- JS füllt dies -->
    </div>

    <form class="neo-box bg-green">
        <h3>Ihr Fazit</h3>
        
        <div class="form-section">
            <p><strong>Welches Design hat Ihnen am besten gefallen?</strong></p>
            <select required>
                <option value="">Bitte wählen...</option>
                <option value="skeptic">A: Manuelle Kontrolle</option>
                <option value="balancer">B: Granulare Auswahl</option>
                <option value="optimist">C: Optimiertes Design</option>
            </select>
        </div>

        <div class="form-section">
            <p><strong>War das Ihnen zugeordnete Design passend für Sie?</strong></p>
            <label><input type="radio" name="fit" value="ja"> Ja, absolut</label><br>
            <label><input type="radio" name="fit" value="nein"> Nein, eher nicht</label>
        </div>

        <div class="form-section">
            <p><strong>Haben Sie weitere Anmerkungen?</strong></p>
            <textarea rows="4" placeholder="Ihr Feedback..."></textarea>
        </div>
        
        <!-- WICHTIG: ID hinzufügen -->
        <button type="submit" id="submit-study" class="neo-btn" style="background:white">Studie abschließen</button>
    </form>
</div>
    <script src="script.js"></script>
</body>
</html>
